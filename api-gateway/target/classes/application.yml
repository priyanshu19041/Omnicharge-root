server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: operator-service
          uri: lb://operator-service
          predicates:
            - Path=/api/v1/operators/**
        - id: recharge-service
          uri: lb://recharge-service
          predicates:
            - Path=/api/v1/recharges/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: operator-service
        url: /operator-service/v3/api-docs
      - name: recharge-service
        url: /recharge-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs

